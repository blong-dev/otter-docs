name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build + check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Smoke-import the package
        run: |
          python -m pip install dist/*.whl
          python -c "import otter_docs; print(f'otter_docs {otter_docs.__version__}')"

  test:
    name: pytest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: python -m ruff check src/ tests/

      - name: Run pytest (unit tests only)
        run: python -m pytest -v

      - name: Clone-eval harness regression (fake embedder, bundled set)
        # Guards the precision/recall/threshold math. NOT a model-
        # quality measurement — CI has no real embedder. Real
        # GPTCloneBench numbers are a documented local procedure.
        run: |
          python -c "
          from otter_docs.eval import evaluate
          from otter_docs.eval_data import load_bundled
          from otter_docs.clients import FakeEmbeddingClient
          pairs = load_bundled()
          m = evaluate(pairs, FakeEmbeddingClient(dim=32), threshold=0.8)
          total = m.true_positive + m.false_positive + m.true_negative + m.false_negative
          assert total == len(pairs), (total, len(pairs))
          print(f'eval harness OK: {len(pairs)} pairs scored, F1={m.f1:.3f} (fake embedder)')
          "
